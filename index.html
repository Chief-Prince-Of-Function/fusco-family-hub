<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1020" />
  <title>Fusco Family Hub</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />

  <!-- Icons -->
  <link rel="icon" href="assets/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" href="assets/favicon-32.png" />
  <link rel="apple-touch-icon" href="assets/icon-192.png" />

  <link rel="stylesheet" href="app.css" />
</head>

<body>
  <header class="topbar">
    <div class="brand">
      <img class="brandIcon" src="assets/icon-192.png" alt="" />
      <div class="brandText">
        <div class="brandTitle">Fusco Family Hub</div>
        <div class="brandSub" id="status">Loading…</div>
      </div>
    </div>

    <div class="actions">
      <button class="btn" id="saveBtn" type="button">Save to Cloud</button>
      <button class="btn ghost" id="refreshBtn" type="button">Refresh</button>
    </div>
  </header>

  <main class="wrap">
    <section class="statusBar" aria-label="Family Status Bar">
      <div class="statusInfo">
        <div class="statusTitle">Fusco Family Hub</div>
        <div class="statusDate" id="statusDate">Today is —</div>
      </div>
      <div class="statusChips">
        <div class="statusChip" id="tasksChip">✅ 0 tasks left</div>
        <div class="statusChip" id="eventsChip">📅 0 events today</div>
        <div class="statusChip" id="nextChip">⏱ Next up: —</div>
        <div class="statusChip weatherChip">
          <span class="weatherValue" id="weatherValue">🌤 --°</span>
          <form class="weatherForm" id="weatherForm">
            <label class="srOnly" for="weatherZip">Zip</label>
            <input id="weatherZip" class="textInput weatherInput" type="text" inputmode="numeric" placeholder="Zip" maxlength="10" />
            <button class="btn small ghost" type="submit">Go</button>
          </form>
        </div>
      </div>
    </section>
    <section class="grid">
      <article class="card">
        <h2 class="cardTitle">Notes</h2>
        <div class="cardBody notesCard">
          <label class="inputLabel" for="notesInput">Quick notes</label>
          <textarea id="notesInput" class="textInput notesInput" rows="8" placeholder="Jot down simple notes for the family..."></textarea>
          <div class="muted notesMeta" id="notesMeta">Saved locally on this device.</div>
        </div>
      </article>

      <article class="card">
        <h2 class="cardTitle">To Do</h2>
        <div class="cardBody">
          <form class="todoForm" id="todoForm">
            <label class="inputLabel" for="todoInput">Add a task</label>
            <div class="todoInputRow">
              <input id="todoInput" class="textInput" type="text" placeholder="Add a new task" autocomplete="off" />
              <button class="btn" type="submit">Add</button>
            </div>
          </form>
          <div class="muted" id="todoEmpty">No tasks yet. Add your first one above.</div>
          <div class="todoList" id="todoList" aria-live="polite"></div>
        </div>
      </article>

      <article class="card">
        <h2 class="cardTitle">Calendar</h2>
        <div class="cardBody">
          <div class="calendarList" id="calendarList"></div>
          <div class="muted calendarStatus" id="calendarStatus">Loading calendar…</div>
        </div>
      </article>

      <article class="card">
        <h2 class="cardTitle">Today</h2>
        <div class="cardBody" id="todayBlock">
          <div class="muted">No data yet.</div>
        </div>
      </article>

    </section>
  </main>

  <footer class="footer">
    <div class="muted" id="footerMeta">—</div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
