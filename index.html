<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f6f1e9" />
  <title>Fusco Family Hub</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="assets/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" href="assets/favicon-32.png" />
  <link rel="apple-touch-icon" href="assets/icon-192.png" />
  <link rel="stylesheet" href="app.css" />
</head>
<body>
  <main class="container">
    <header class="hero card">
      <div>
        <p class="eyebrow">Shared family board</p>
        <h1>Fusco Family Hub</h1>
        <p class="today" id="todayLine">Loading today…</p>
      </div>
      <div class="heroActions">
        <p class="syncText" id="syncStatus">Ready to sync.</p>
        <button id="refreshBtn" class="btn" type="button">Refresh</button>
      </div>
    </header>

    <section class="layout">
      <article class="card section" id="tasksSection">
        <div class="sectionHead">
          <h2>Tasks</h2>
          <label class="toggle"><input type="checkbox" id="hideCompleted" /> Hide completed</label>
        </div>
        <form id="taskForm" class="inlineForm">
          <input id="taskTitle" type="text" placeholder="Add a task" required maxlength="140" />
          <input id="taskAssignee" type="text" placeholder="Assignee (optional)" maxlength="60" />
          <button class="btn" type="submit">Save</button>
        </form>
        <div id="tasksList" class="stack"></div>
      </article>

      <article class="card section" id="notesSection">
        <div class="sectionHead"><h2>Notes</h2></div>
        <form id="noteForm" class="inlineForm">
          <textarea id="noteContent" rows="2" placeholder="Add a shared note" required></textarea>
          <button class="btn" type="submit">Save</button>
        </form>
        <div id="notesList" class="stack"></div>
      </article>

      <article class="card section" id="mealsSection">
        <div class="sectionHead"><h2>Meals</h2></div>
        <form id="mealForm" class="inlineForm">
          <select id="mealDay" required>
            <option value="">Day</option>
            <option>Monday</option><option>Tuesday</option><option>Wednesday</option>
            <option>Thursday</option><option>Friday</option><option>Saturday</option><option>Sunday</option>
          </select>
          <input id="mealName" type="text" placeholder="Meal" required maxlength="120" />
          <input id="mealNotes" type="text" placeholder="Notes (optional)" maxlength="200" />
          <button class="btn" type="submit">Save</button>
        </form>
        <div id="mealsList" class="stack"></div>
      </article>

      <article class="card section" id="linksSection">
        <div class="sectionHead"><h2>Quick Links</h2></div>
        <form id="linkForm" class="inlineForm">
          <input id="linkTitle" type="text" placeholder="Title" required maxlength="80" />
          <input id="linkUrl" type="url" placeholder="https://" required maxlength="300" />
          <input id="linkIcon" type="text" placeholder="Emoji" maxlength="6" />
          <button class="btn" type="submit">Save</button>
        </form>
        <div id="linksList" class="linksGrid"></div>
      </article>
    </section>
  </main>

  <template id="emptyStateTemplate">
    <div class="empty">Nothing here yet.</div>
  </template>

  <script src="app.js"></script>
</body>
</html>
